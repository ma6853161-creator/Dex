name: Build APK

# Runs automatically on every push, and can also be triggered manually from
# the GitHub app/website (Actions tab -> Build APK -> Run workflow) — useful
# since there's no local machine to build from.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write   # needed so the release job can attach the APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # No gradlew is committed to this repo (avoids committing a binary
      # gradle-wrapper.jar). This action installs Gradle itself directly, so
      # `gradle` works on PATH with no wrapper needed.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniversalDexReceiver-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # Also publish to a rolling "latest" GitHub Release so the APK can be
      # downloaded directly from the phone browser (Releases page) without
      # needing to log in and unzip an Actions artifact.
      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: Automatically built from the latest commit on main.
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk
